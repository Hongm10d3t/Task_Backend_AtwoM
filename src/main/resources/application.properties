spring.application.name=task-backend

# Load local .env file (if present) as additional properties
spring.config.import=optional:file:.env[.properties]

# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/taskdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Session cookie (JSESSIONID) - ensure it is not accessible from client-side scripts
server.servlet.session.cookie.http-only=true

# JWT access token
# jwt.secret: read from JWT_SECRET env var. The fallback value below is a DEV-ONLY demo default
# (long enough for HS512) - do NOT rely on it outside local demo/learning use.
jwt.secret=${JWT_SECRET:demo-only-jwt-secret-do-not-use-in-production-please-change-me-1234567890abcdefg}
# Access token lifetime in milliseconds - defaults to 15 minutes for this demo.
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
